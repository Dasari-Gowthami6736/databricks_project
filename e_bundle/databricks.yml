# This is a Databricks asset bundle definition for e_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: e_bundle
  uuid: bcba9605-2362-4b0f-8113-991ccd1063b6

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-9df2e3f5-68e5.cloud.databricks.com
    variables:
      catalog: my_first_project
      schema: dev
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-9df2e3f5-68e5.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/dasarigowthami865@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/dasarigowthami865@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: my_first_project
      schema: prod
    permissions:
      - user_name: dasarigowthami865@gmail.com
        level: CAN_MANAGE
